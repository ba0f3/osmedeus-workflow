kind: flow
name: domain-extensive
description: Exhaustive recon - full port range with DNS bruteforce and permutations
tags: recon, domain, extensive
extends: domain-standard
help:
  example_targets: ['example.com', 'hackerone.com']
  usage: osmedeus run -f domain-extensive -t example.com

# -----------------------------------------------------------------------------
# PARAMS SECTION
# -----------------------------------------------------------------------------
params:
  - name: enableDnsBruteFocing
    default: true
  - name: enablePermutation
    default: true
  - name: enableStoreHTTPResponse
    default: true
  - name: commonHttpsPort
    default: "1-65535"
  - name: commonHttpPorts
    default: "1-65535"
# -----------------------------------------------------------------------------
# DEPENDENCIES SECTION
# -----------------------------------------------------------------------------
dependencies:
  variables:
    - name: Target
      type: domain
      required: true

# -----------------------------------------------------------------------------
# MODULES SECTION
# Execution order with dependencies
# -----------------------------------------------------------------------------
modules:
  # ===========================================================================
  # Phase 1: Subdomain Enumeration
  # ===========================================================================
  - name: enum-subdomain
    path: common/enum-subdomain.yaml

  # ===========================================================================
  # Phase 2: Probing
  # ===========================================================================
  - name: probe-dns
    path: common/probe-dns.yaml
    depends_on:
      - enum-subdomain

  # ===========================================================================
  # Phase 3: Entity and Related Domain Discovery
  # ===========================================================================
  - name: enum-entity
    path: common/enum-entity.yaml
    depends_on:
      - probe-dns

  # ===========================================================================
  # Phase 4: Fingerprinting
  # ===========================================================================
  - name: recon-http-fp
    path: common/recon-http-fp.yaml
    depends_on:
      - probe-dns

  # ===========================================================================
  # Phase 5: Screenshots
  # ===========================================================================
  - name: recon-screenshot
    path: common/recon-screenshot.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 6: Spidering
  # ===========================================================================
  - name: recon-spider
    path: common/recon-spider.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 7: Archiving
  # ===========================================================================
  - name: util-archive
    path: common/util-archive.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 8: IP Space Enumeration
  # ===========================================================================
  - name: enum-ipspace
    path: common/enum-ipspace.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 9: Vulnerability Scanning
  # ===========================================================================
  - name: scan-vuln
    path: common/scan-vuln.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 10: Port Scanning
  # ===========================================================================
  - name: probe-port
    path: common/probe-port.yaml
    depends_on:
      - enum-ipspace

  # ===========================================================================
  # Phase 11: Network Service Audit
  # ===========================================================================
  - name: scan-service
    path: common/scan-service.yaml
    depends_on:
      - enum-ipspace

  # ===========================================================================
  # Phase 12: Thorough Vulnerability Scanning with Vigolium
  # ===========================================================================
  - name: scan-vuln-thorough
    path: common/scan-vuln-thorough.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 13: Injection Scanning (SQLi / XSS on crawled URLs)
  # ===========================================================================
  - name: scan-injection
    path: common/scan-injection.yaml
    depends_on:
      - recon-spider
