# =============================================================================
# Flow Workflow: Domain Reconnaissance
# =============================================================================
# Running default reconnaissance routine for domain targets.
# Executes subdomain enumeration, probing, fingerprinting, screenshots,
# spidering, vulnerability scanning, directory bruteforcing, and port scanning.
# =============================================================================

# -----------------------------------------------------------------------------
# WORKFLOW-LEVEL FIELDS
# -----------------------------------------------------------------------------

kind: flow
name: general
description: Standard recon - subdomains, fingerprints, vulns, and more
tags: recon, domain, standard
help:
  example_targets: ['example.com', 'hackerone.com']
  usage: osmedeus run -f general -t example.com

# -----------------------------------------------------------------------------
# PARAMS SECTION
# -----------------------------------------------------------------------------
params:
  - name: enableDnsBruteFocing
    default: true
  - name: enableStoreHTTPResponse
    default: false

# -----------------------------------------------------------------------------
# DEPENDENCIES SECTION
# -----------------------------------------------------------------------------
dependencies:
  variables:
    - name: Target
      type: domain
      required: true

# -----------------------------------------------------------------------------
# MODULES SECTION
# Execution order with dependencies
# -----------------------------------------------------------------------------
modules:
  # ===========================================================================
  # Phase 1: Subdomain Enumeration
  # ===========================================================================
  - name: enum-subdomain
    path: common/enum-subdomain.yaml

  # ===========================================================================
  # Phase 2: Probing
  # ===========================================================================
  - name: probe-dns
    path: common/probe-dns.yaml
    depends_on:
      - enum-subdomain

  # ===========================================================================
  # Phase 3: Entity and Related Domain Discovery
  # ===========================================================================
  - name: enum-entity
    path: common/enum-entity.yaml
    depends_on:
      - probe-dns

  # ===========================================================================
  # Phase 4: Fingerprinting
  # ===========================================================================
  - name: recon-http-fp
    path: common/recon-http-fp.yaml
    depends_on:
      - probe-dns

  # ===========================================================================
  # Phase 5: Screenshots
  # ===========================================================================
  - name: recon-screenshot
    path: common/recon-screenshot.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 6: Spidering
  # ===========================================================================
  - name: recon-spider
    path: common/recon-spider.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 7: Archiving
  # ===========================================================================
  - name: util-archive
    path: common/util-archive.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 8: IP Space Enumeration
  # ===========================================================================
  - name: enum-ipspace
    path: common/enum-ipspace.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 9: Vulnerability Scanning
  # ===========================================================================
  - name: scan-vuln
    path: common/scan-vuln.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 10: Port Scanning
  # ===========================================================================
  - name: probe-port
    path: common/probe-port.yaml
    depends_on:
      - enum-ipspace

  # ===========================================================================
  # Phase 11: Network Service Audit
  # ===========================================================================
  - name: scan-service
    path: common/scan-service.yaml
    depends_on:
      - enum-ipspace

  # ===========================================================================
  # Phase 12: Content Discovery
  # ===========================================================================
  - name: scan-content
    path: common/scan-content.yaml
    depends_on:
      - recon-http-fp

  # ===========================================================================
  # Phase 13: Injection Scanning (SQLi / XSS on crawled URLs)
  # ===========================================================================
  - name: scan-injection
    path: common/scan-injection.yaml
    depends_on:
      - recon-spider
