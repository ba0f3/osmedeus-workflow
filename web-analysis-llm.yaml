kind: flow
name: web-analysis-llm
description: LLM-guided single URL analysis - collect artifacts, tighten surfaces, then scan
tags: recon, url, web, llm, agent
help:
  example_targets: ['https://example.com', 'https://httpbin.org', 'example.com']
  usage: osmedeus run -f web-analysis-llm -t https://example.com

params:
  - name: enableStoreHTTPResponse
    default: true
  - name: enableLLMRecon
    type: bool
    default: true
  - name: enableAutonomousLLM
    type: bool
    default: true
  - name: enableAuthScan
    type: bool
    default: false
  - name: enableAuthDiscovery
    type: bool
    default: true
  - name: enableLLMAuthDiscovery
    type: bool
    default: true
  - name: authMode
    default: "manual"
  - name: useAuthConfigProposal
    type: bool
    default: false
  - name: enableAutoRegister
    type: bool
    default: false

dependencies:
  variables:
    - name: Target
      type: url,domain
      required: true

modules:
  - name: do-recon-http-fp
    path: fragments/do-recon-http-fp.yaml

  - name: do-recon-spider
    path: fragments/do-recon-spider.yaml
    depends_on:
      - do-recon-http-fp

  - name: do-scan-content
    path: fragments/do-scan-content.yaml
    depends_on:
      - do-recon-http-fp

  - name: scan-service
    path: common/scan-service.yaml
    depends_on:
      - do-recon-http-fp

  - name: llm-surface-analysis
    path: common/llm-surface-analysis.yaml
    depends_on:
      - do-recon-spider
      - do-scan-content
      - scan-service

  - name: llm-guided-surface-scan
    path: common/llm-guided-surface-scan.yaml
    depends_on:
      - llm-surface-analysis

  - name: do-scan-vuln
    path: fragments/do-scan-vuln.yaml
    depends_on:
      - llm-guided-surface-scan

  - name: do-scan-vuln-thorough
    path: fragments/do-scan-vuln-thorough.yaml
    depends_on:
      - llm-guided-surface-scan

  - name: do-scan-injection
    path: fragments/do-scan-injection.yaml
    depends_on:
      - llm-guided-surface-scan
      - do-scan-content

  - name: auth-discovery
    path: common/auth-discovery.yaml
    depends_on:
      - do-scan-injection

  - name: auth-browser-login
    path: common/auth-browser-login.yaml
    depends_on:
      - auth-discovery

  - name: auth-session
    path: common/auth-session.yaml
    depends_on:
      - auth-discovery
      - auth-browser-login

  - name: auth-spider
    path: common/auth-spider.yaml
    depends_on:
      - auth-session

  - name: auth-content
    path: common/auth-content.yaml
    depends_on:
      - auth-session

  - name: auth-vuln
    path: common/auth-vuln.yaml
    depends_on:
      - auth-spider
      - auth-content

  - name: auth-injection
    path: common/auth-injection.yaml
    depends_on:
      - auth-spider
      - auth-content

  - name: llm-autonomous-controller
    path: common/llm-autonomous-controller.yaml
    depends_on:
      - do-scan-vuln
      - do-scan-vuln-thorough
      - do-scan-injection
      - auth-vuln
      - auth-injection
