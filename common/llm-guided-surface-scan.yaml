# =============================================================================
# Module Workflow: LLM-Guided Surface Scan
# =============================================================================

kind: module
name: llm-guided-surface-scan
description: Probe and crawl LLM-suggested URLs, then feed new parameterized links into follow-up testing
tags: llm, recon, spider, surface-expansion

# -----------------------------------------------------------------------------
# PARAMS SECTION
# -----------------------------------------------------------------------------
params:
  - name: llmSurfaceCandidatesFile
    default: "{{Output}}/llm/surface-candidates-{{TargetSpace}}.txt"
  - name: llmParameterCandidatesFile
    default: "{{Output}}/llm/parameter-candidates-{{TargetSpace}}.txt"
  - name: llmRouteCandidatesFile
    default: "{{Output}}/llm/route-candidates-{{TargetSpace}}.txt"
  - name: llmRouteSurfaceCandidatesFile
    default: "{{Output}}/llm/route-surface-candidates-{{TargetSpace}}.txt"
  - name: llmSurfaceHttpJsonl
    default: "{{Output}}/llm/surface-http-{{TargetSpace}}.jsonl"
  - name: llmSurfaceLiveFile
    default: "{{Output}}/llm/surface-live-{{TargetSpace}}.txt"
  - name: llmSurfaceLinksFile
    default: "{{Output}}/llm/surface-links-{{TargetSpace}}.txt"
  - name: httpFile
    default: "{{Output}}/probing/http-{{TargetSpace}}.txt"
  - name: llmRouteExpansionLimit
    default: "2000"
  - name: linkFile
    default: "{{Output}}/links/links-{{TargetSpace}}.txt"
  - name: httpThreads
    default: "{{ threads * 4 }}"
  - name: httpTimeout
    default: "15"
  - name: spiderThreads
    default: "{{ threads }}"
  - name: spiderPrallel
    default: "{{ threads / 2 }}"
  - name: spiderTimeout
    default: "45m"
  - name: crawlingTime
    default: "10"
  - name: defaultUA
    default: "User-Agent: Mozilla/5.0 (compatible; Osmedeus/v5; +https://github.com/j3ssie/osmedeus)"

# -----------------------------------------------------------------------------
# DEPENDENCIES SECTION
# -----------------------------------------------------------------------------
dependencies:
  commands:
    - pd-httpx
    - katana
    - jq

  variables:
    - name: Target
      type: string
      required: true

# -----------------------------------------------------------------------------
# REPORTS SECTION
# -----------------------------------------------------------------------------
reports:
  - name: llm-surface-live
    path: "{{llmSurfaceLiveFile}}"
    type: text
    description: Live URLs discovered from LLM-suggested surfaces

  - name: llm-surface-links
    path: "{{llmSurfaceLinksFile}}"
    type: text
    description: Crawled links from LLM-suggested surfaces

# -----------------------------------------------------------------------------
# STEPS SECTION
# -----------------------------------------------------------------------------
steps:
  - name: create-output-folder
    type: function
    log: "Creating LLM surface scan output folder"
    functions:
      - 'create_folder("{{Output}}/llm")'
      - 'create_folder("{{Output}}/links")'

  - name: expand-route-candidates-to-surfaces
    type: bash
    log: "Expanding LLM route candidates against known HTTP roots"
    pre_condition: 'file_length("{{llmRouteCandidatesFile}}") > 0 && file_length("{{httpFile}}") > 0'
    commands:
      - |
        python3 - "{{httpFile}}" "{{llmRouteCandidatesFile}}" "{{llmRouteSurfaceCandidatesFile}}" "{{llmSurfaceCandidatesFile}}" "{{llmRouteExpansionLimit}}" <<'PY'
        import sys
        from pathlib import Path
        from urllib.parse import urljoin

        roots_path = Path(sys.argv[1])
        routes_path = Path(sys.argv[2])
        route_out = Path(sys.argv[3])
        surface_path = Path(sys.argv[4])
        limit = int(sys.argv[5])

        roots = [line.strip().rstrip("/") for line in roots_path.read_text(encoding="utf-8", errors="replace").splitlines() if line.strip().startswith(("http://", "https://"))]
        routes = []
        for raw in routes_path.read_text(encoding="utf-8", errors="replace").splitlines():
            route = raw.strip()
            if not route:
                continue
            if not route.startswith("/"):
                route = "/" + route
            routes.append(route)

        urls = []
        seen = set()
        for root in roots:
            for route in routes:
                url = urljoin(root + "/", route.lstrip("/"))
                if url not in seen:
                    seen.add(url)
                    urls.append(url)
                    if len(urls) >= limit:
                        break
            if len(urls) >= limit:
                break

        route_out.write_text("\n".join(urls) + ("\n" if urls else ""), encoding="utf-8")
        with surface_path.open("a", encoding="utf-8") as handle:
            for url in urls:
                handle.write(url + "\n")
        PY
        sort -u "{{llmSurfaceCandidatesFile}}" -o "{{llmSurfaceCandidatesFile}}" 2>/dev/null || true
    on_error:
      - action: continue

  - name: probe-llm-surface-candidates
    type: bash
    log: "Probing LLM-suggested surface candidates"
    pre_condition: 'file_length("{{llmSurfaceCandidatesFile}}") > 0'
    commands:
      - 'cat {{llmSurfaceCandidatesFile}} | pd-httpx -H "{{defaultUA}}" -timeout {{httpTimeout}} -t {{httpThreads}} -no-fallback -no-color -silent -json -title -favicon -tech-detect -status-code -follow-host-redirects -include-chain >> {{llmSurfaceHttpJsonl}}'
      - "cat {{llmSurfaceHttpJsonl}} | jq -r '.url // empty' | sort -u > {{llmSurfaceLiveFile}}"
    on_error:
      - action: continue

  - name: crawl-llm-live-surfaces
    type: foreach
    log: "Crawling live LLM-suggested surfaces"
    pre_condition: 'file_length("{{llmSurfaceLiveFile}}") > 0'
    input: "{{llmSurfaceLiveFile}}"
    variable: line
    threads: "{{spiderPrallel}}"
    step:
      name: katana-llm-surface
      type: bash
      command: "timeout -k 1m {{spiderTimeout}} katana -silent -c {{spiderThreads}} -jc -ct {{crawlingTime}} -u [[line]] | sort -u >> {{llmSurfaceLinksFile}}"
      on_error:
        - action: continue

  - name: merge-llm-surface-links
    type: function
    log: "Merging LLM surface links into main link and parameter candidate files"
    pre_condition: 'file_exists("{{llmSurfaceLinksFile}}")'
    functions:
      - sort_unix("{{llmSurfaceLinksFile}}")
      - exec_cmd("cat {{llmSurfaceLiveFile}} >> {{httpFile}}")
      - sort_unix("{{httpFile}}")
      - exec_cmd("cat {{llmSurfaceLinksFile}} >> {{linkFile}}")
      - sort_unix("{{linkFile}}")
      - exec_cmd("grep '?' {{llmSurfaceLinksFile}} | grep -Fi '{{TargetSpace}}' >> {{llmParameterCandidatesFile}} || true")
      - sort_unix("{{llmParameterCandidatesFile}}")
    on_error:
      - action: continue
