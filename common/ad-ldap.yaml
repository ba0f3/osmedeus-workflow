# =============================================================================
# Module Workflow: LDAP Interrogation
# =============================================================================

kind: module
name: ad-ldap
description: LDAP interrogation — anonymous bind, domain info dump, signing checks
tags: ad, windows, ldap, active-directory, directory-services

# -----------------------------------------------------------------------------
# PARAMS SECTION
# -----------------------------------------------------------------------------
params:
  - name: targetIp
    default: "{{Target}}"

  - name: domainName
    default: ""

  - name: ldapPort
    default: "389"

  - name: ldapBaseDn
    default: ""

  - name: bindUser
    default: ""
  - name: bindPass
    default: ""

  - name: ldapTimeout
    default: "30"

  - name: outputDir
    default: "{{Output}}/ad/ldap"

  - name: ldapAnonymousOutput
    default: "{{Output}}/ad/ldap/ldap-anonymous-{{TargetSpace}}.txt"
  - name: ldapNamingContexts
    default: "{{Output}}/ad/ldap/ldap-naming-contexts-{{TargetSpace}}.txt"
  - name: ldapDomainDump
    default: "{{Output}}/ad/ldap/ldap-domain-dump-{{TargetSpace}}.txt"
  - name: ldapUsers
    default: "{{Output}}/ad/ldap/ldap-users-{{TargetSpace}}.txt"
  - name: ldapGroups
    default: "{{Output}}/ad/ldap/ldap-groups-{{TargetSpace}}.txt"
  - name: ldapComputers
    default: "{{Output}}/ad/ldap/ldap-computers-{{TargetSpace}}.txt"
  - name: ldapSigningCheck
    default: "{{Output}}/ad/ldap/ldap-signing-{{TargetSpace}}.txt"

# -----------------------------------------------------------------------------
# DEPENDENCIES SECTION
# -----------------------------------------------------------------------------
dependencies:
  commands:
    - ldapsearch
    - netexec

  variables:
    - name: Target
      type: string
      required: true

# -----------------------------------------------------------------------------
# REPORTS SECTION
# -----------------------------------------------------------------------------
reports:
  - name: ldap-domain-dump
    path: "{{ldapDomainDump}}"
    type: text
    description: Full LDAP domain dump

  - name: ldap-users
    path: "{{ldapUsers}}"
    type: text
    description: Users from LDAP

  - name: ldap-signing
    path: "{{ldapSigningCheck}}"
    type: text
    description: LDAP signing / channel binding status

# -----------------------------------------------------------------------------
# STEPS SECTION
# -----------------------------------------------------------------------------
steps:
  # ---------------------------------------------------------------------------
  # Setup: Create output folders
  # ---------------------------------------------------------------------------
  - name: create-output-folders
    type: function
    log: "Creating LDAP output folders"
    functions:
      - 'create_folder("{{Output}}/ad/ldap")'

  # ---------------------------------------------------------------------------
  # LDAP anonymous bind check
  # ---------------------------------------------------------------------------
  - name: ldap-anonymous-bind
    type: bash
    log: "Testing LDAP anonymous bind"
    commands:
      - 'ldapsearch -x -H ldap://{{targetIp}}:{{ldapPort}} -b "" -s base -tt + > {{ldapAnonymousOutput}} 2>&1 || echo "LDAP anonymous bind FAILED" > {{ldapAnonymousOutput}}'
    on_error:
      - action: continue

  # ---------------------------------------------------------------------------
  # Extract naming contexts
  # ---------------------------------------------------------------------------
  - name: get-naming-contexts
    type: function
    log: "Extracting LDAP naming contexts"
    pre_condition: 'file_exists("{{ldapAnonymousOutput}}")'
    functions:
      - 'exec_cmd("grep -i namingContexts {{ldapAnonymousOutput}} | sort -u > {{ldapNamingContexts}}")'
    on_error:
      - action: continue

  # ---------------------------------------------------------------------------
  # LDAP domain dump (anonymous)
  # ---------------------------------------------------------------------------
  - name: ldap-domain-dump
    type: bash
    log: "Dumping AD domain info via LDAP"
    pre_condition: 'file_exists("{{ldapNamingContexts}}")'
    commands:
      - 'BASE_DN=$(head -1 {{ldapNamingContexts}} | awk "{print \$2}"); [ -n "$BASE_DN" ] && ldapsearch -x -H ldap://{{targetIp}}:{{ldapPort}} -b "$BASE_DN" -E pr=1000/noprompt -LLL > {{ldapDomainDump}} 2>/dev/null || true'
    on_error:
      - action: continue

  # ---------------------------------------------------------------------------
  # Extract objects from LDAP dump
  # ---------------------------------------------------------------------------
  - name: extract-ldap-objects
    type: function
    log: "Extracting user, group, and computer objects from LDAP dump"
    pre_condition: 'file_exists("{{ldapDomainDump}}")'
    functions:
      - 'exec_cmd("grep \"^dn:.*CN=Users\" {{ldapDomainDump}} | grep -o \"CN=[^,]*\" | sed \"s/CN=//\" | sort -u > {{ldapUsers}}")'
      - 'exec_cmd("grep \"^dn:.*CN=Groups\" {{ldapDomainDump}} | grep -o \"CN=[^,]*\" | sed \"s/CN=//\" | sort -u > {{ldapGroups}}")'
      - 'exec_cmd("grep \"^dn:.*CN=Computers\" {{ldapDomainDump}} | grep -o \"CN=[^,]*\" | sed \"s/CN=//\" | sort -u > {{ldapComputers}}")'
      - 'exec_cmd("grep -i \"sAMAccountName:\" {{ldapDomainDump}} | awk \"{print \\\$2}\" | sort -u > {{Output}}/ad/ldap/samaccountnames-{{TargetSpace}}.txt")'
    on_error:
      - action: continue

  # ---------------------------------------------------------------------------
  # LDAP signing check via netexec
  # ---------------------------------------------------------------------------
  - name: ldap-signing-check
    type: bash
    log: "Checking LDAP signing / channel binding requirements"
    commands:
      - 'netexec ldap {{targetIp}} -u "" -p "" -M ldap-signing > {{ldapSigningCheck}} 2>/dev/null || echo "LDAP signing check not available" > {{ldapSigningCheck}}'
    on_error:
      - action: continue

  # ---------------------------------------------------------------------------
  # LDAP with credentials (if provided)
  # ---------------------------------------------------------------------------
  - name: ldap-authenticated-dump
    type: bash
    log: "Running authenticated LDAP domain dump"
    pre_condition: '!is_empty("{{bindUser}}")'
    commands:
      - 'BASE_DN=$(head -1 {{ldapNamingContexts}} | awk "{print \$2}"); [ -n "$BASE_DN" ] && ldapsearch -x -H ldap://{{targetIp}}:{{ldapPort}} -b "$BASE_DN" -D "{{bindUser}}" -w "{{bindPass}}" -E pr=1000/noprompt -LLL > {{Output}}/ad/ldap/ldap-authenticated-dump-{{TargetSpace}}.txt 2>/dev/null || true'
    on_error:
      - action: continue

  # ---------------------------------------------------------------------------
  # Summary
  # ---------------------------------------------------------------------------
  - name: summarize-ldap
    type: function
    log: "Summarizing LDAP findings"
    functions:
      - 'log_info("LDAP interrogation complete for {{targetIp}}")'
      - 'log_info("Users from LDAP: " + file_length("{{ldapUsers}}"))'
      - 'log_info("Groups from LDAP: " + file_length("{{ldapGroups}}"))'
      - 'log_info("Computers from LDAP: " + file_length("{{ldapComputers}}"))'
