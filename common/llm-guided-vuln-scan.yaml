# =============================================================================
# Module Workflow: LLM-Guided Vulnerability Scanning
# =============================================================================

kind: module
name: llm-guided-vuln-scan
description: Run Nuclei against LLM-tightened live surfaces
tags: llm, vulnerability, security, nuclei

# -----------------------------------------------------------------------------
# PARAMS SECTION
# -----------------------------------------------------------------------------
params:
  - name: llmSurfaceLiveFile
    default: "{{Output}}/llm/surface-live-{{TargetSpace}}.txt"
  - name: llmVulnDir
    default: "{{Output}}/vulnscan/llm"
  - name: llmNucleiOutputJsonl
    default: "{{Output}}/vulnscan/llm/nuclei-jsonl-{{TargetSpace}}.txt"
  - name: llmNucleiCleanOutputJsonl
    default: "{{Output}}/vulnscan/llm/clean-jsonl-{{TargetSpace}}.txt"
  - name: llmNucleiMarkdownReport
    default: "{{Output}}/vulnscan/llm/nuclei-overview-report-{{TargetSpace}}.md"
  - name: nucleiTemplateConfig
    default: "~/nuclei-templates/"
  - name: nucleiThreads
    default: "{{ threads * 10 }}"
  - name: nucleiTimeout
    default: "4h"
  - name: nucleiSeverity
    default: "critical,high,medium,low,info"
  - name: extraNuclei
    default: " "
  - name: defaultUA
    default: "User-Agent: Mozilla/5.0 (compatible; Osmedeus/v5; +https://github.com/j3ssie/osmedeus)"

# -----------------------------------------------------------------------------
# DEPENDENCIES SECTION
# -----------------------------------------------------------------------------
dependencies:
  commands:
    - nuclei

  variables:
    - name: Target
      type: string
      required: true

# -----------------------------------------------------------------------------
# REPORTS SECTION
# -----------------------------------------------------------------------------
reports:
  - name: llm-nuclei-raw-json
    path: "{{llmNucleiOutputJsonl}}"
    type: jsonl
    description: Nuclei results from LLM-tightened surfaces

  - name: llm-nuclei-markdown-report
    path: "{{llmNucleiMarkdownReport}}"
    type: markdown
    description: Markdown report for LLM-guided Nuclei results

# -----------------------------------------------------------------------------
# STEPS SECTION
# -----------------------------------------------------------------------------
steps:
  - name: create-output-folder
    type: function
    log: "Creating LLM-guided vulnerability output folder"
    functions:
      - 'create_folder("{{llmVulnDir}}")'

  - name: nuclei-llm-surface-scan
    type: bash
    log: "Running Nuclei on LLM-tightened live surfaces"
    pre_condition: 'file_length("{{llmSurfaceLiveFile}}") > 0'
    commands:
      - "timeout -k 1m {{nucleiTimeout}} nuclei -H '{{defaultUA}}' -silent -c {{nucleiThreads}} -jsonl -severity '{{nucleiSeverity}}' -t {{nucleiTemplateConfig}} -l {{llmSurfaceLiveFile}} -irr -o {{llmNucleiOutputJsonl}} {{extraNuclei}} > /dev/null 2>&1"
    on_error:
      - action: continue

  - name: nuclei-report-processing
    type: function
    log: "Processing LLM-guided Nuclei report"
    pre_condition: 'file_length("{{llmNucleiOutputJsonl}}") > 0'
    functions:
      - jsonl_filter("{{llmNucleiOutputJsonl}}", "{{llmNucleiCleanOutputJsonl}}", "template-id,info.name,info.severity,matched-at,matched-name")
      - sort_unix("{{llmNucleiCleanOutputJsonl}}")
      - 'convert_jsonl_to_markdown("{{llmNucleiCleanOutputJsonl}}", "{{llmNucleiMarkdownReport}}")'
      - 'db_import_vuln_from_file("{{TargetSpace}}", "{{llmNucleiOutputJsonl}}")'
      - 'send_telegram_file("{{llmNucleiMarkdownReport}}", "LLM-Guided Nuclei Results")'
    on_error:
      - action: continue
