# =============================================================================
# Module Workflow: Directory Scanning
# =============================================================================

kind: module
name: scan-content
description: Bruteforce directories and files with ffuf
tags: directory, bruteforce, content-discovery

# -----------------------------------------------------------------------------
# PARAMS SECTION
# -----------------------------------------------------------------------------
params:
  - name: httpFile
    default: "{{Output}}/probing/http-{{TargetSpace}}.txt"

  - name: dirbLimit
    default: "10000"

  # speed tuning params
  - name: deparosMaxtime
    default: "30m"
  - name: deparosParallel
    default: "10"
  - name: deparosThreads
    default: "40"
  - name: deparosMaxPerHost
    default: "40"
  - name: deparosTimeout
    default: "30m"

  ## ffuf params
  - name: ffufTimeout
    default: "30m"
  - name: ffufParallel
    default: "10"
  - name: ffThreads
    default: "25"

  - name: defaultUA
    default: "User-Agent: Mozilla/5.0 (compatible; Osmedeus/v5; +https://github.com/j3ssie/osmedeus)"
  - name: vigoliumDefaultUA
    default: "User-Agent: Mozilla/5.0 (compatible; Vigolium OSS +https://github.com/vigolium/vigolium)"

  - name: contentDiscoverFile
    default: "{{Output}}/content-discovery/ffuf-{{TargetSpace}}.jsonl"
  - name: contentDiscoverFilteredFile
    default: "{{Output}}/content-discovery/filtered-{{TargetSpace}}.jsonl"

  # shared vigolium database that every target in the foreach accumulates into
  - name: deparosDBDir
    default: "{{Output}}/content-discovery/deparos-dbs"

  # output reports (a single vigolium export turns the shared db into the HTML report + raw JSONL)
  - name: deparosHTMLReport
    default: "{{Output}}/content-discovery/deparos-{{TargetSpace}}.html"
  # raw JSONL exported by vigolium (each record is wrapped as {"type":"http_record","data":{...}})
  - name: contentDiscoveryRawJsonlFile
    default: "{{Output}}/content-discovery/deparos-{{TargetSpace}}.jsonl"
  # normalized/flattened records consumed by the markdown + db steps
  - name: contentDiscoveryJsonlFile
    default: "{{Output}}/content-discovery/deparos-records-{{TargetSpace}}.jsonl"
  - name: contentDiscoveryCleanJsonlFile
    default: "{{Output}}/content-discovery/deparos-clean-{{TargetSpace}}.jsonl"
  - name: contentDiscoverMarkdownFile
    default: "{{Output}}/content-discovery/content-discovery-report-{{TargetSpace}}.md"

  # for doing http fingerprinting on discovered urls
  - name: httpThreads
    default: "{{ threads * 2 }}"
  - name: httpTimeout
    default: "15"
  - name: contentDiscoverUrlsFile
    default: "{{Output}}/content-discovery/content-discovery-url-{{TargetSpace}}.txt"
  - name: httpFingerprintJsonFile
    default: "{{Output}}/content-discovery/content-fingerprint-{{TargetSpace}}.jsonl"
  - name: httpInterestingFilteredJsonFile
    default: "{{Output}}/content-discovery/content-fingerprint-filtered-{{TargetSpace}}.jsonl"

  # wordlists
  - name: shortFileWordlist
    default: "{{Data}}/wordlists/content/file-short.txt"
  - name: longFileWordlist
    default: "{{Data}}/wordlists/content/file-long.txt"
  - name: shortDirWordlist
    default: "{{Data}}/wordlists/content/dir-short.txt"
  - name: longDirWordlist
    default: "{{Data}}/wordlists/content/dir-long.txt"
  - name: contentDiscoverWordlist
    default: "{{Data}}/wordlists/content/small.txt"

# -----------------------------------------------------------------------------
# DEPENDENCIES SECTION
# -----------------------------------------------------------------------------
dependencies:
  commands:
    - ffuf
    - jq

  variables:
    - name: Target
      type: string
      required: true

# -----------------------------------------------------------------------------
# REPORTS SECTION
# -----------------------------------------------------------------------------
reports:
  - name: beautify-content-discovery-results
    path: "{{deparosHTMLReport}}"
    type: html
    description: Beautified content discovery results

  - name: content-discovery-markdown-report
    path: "{{contentDiscoverMarkdownFile}}"
    type: md
    description: Markdown report of interesting content discovery results

# -----------------------------------------------------------------------------
# STEPS SECTION
# -----------------------------------------------------------------------------
steps:
  # ---------------------------------------------------------------------------
  # Setup: Create output folder
  # ---------------------------------------------------------------------------
  - name: create-output-folder
    type: function
    log: "Creating content-discovery output folder"
    functions:
      - 'create_folder("{{Output}}/content-discovery")'
      - 'create_folder("{{deparosDBDir}}")'
  # ---------------------------------------------------------------------------
  # Check input file size limit
  # ---------------------------------------------------------------------------
  - name: check-input-limit
    type: function
    log: "Checking input file size"
    pre_condition: 'file_length("{{httpFile}}") > {{dirbLimit}}'
    functions:
      - 'log_error("Filter", "Got input file greater than {{dirbLimit}} line")'
      - "skip()"

  # ---------------------------------------------------------------------------
  # Directory bruteforce with ffuf
  # ---------------------------------------------------------------------------
  - name: directory-bruteforce
    type: foreach
    log: "Running directory bruteforce with vigolium"
    pre_condition: 'file_exists("{{httpFile}}")'
    input: "{{httpFile}}"
    variable: line # this is the variable name for each line in the input file [[line]]
    threads: "{{deparosParallel}}"
    step:
      name: vigolium-single-target
      type: bash
      command: "timeout -k 1m {{deparosTimeout}} vigolium run discover --silent -H \"{{vigoliumDefaultUA}}\" --omit-response --db {{deparosDBDir}}/vgnm_{{TargetSpace}}.sqlite --concurrency {{deparosThreads}} --max-per-host {{deparosMaxPerHost}} --scanning-max-duration {{deparosMaxtime}} --fuzz-wordlist {{contentDiscoverWordlist}} -t '[[line]]'"
      # with custom wordlists

  - name: "generate-deparos-reports"
    type: bash
    log: "Generate vigolium HTML report and JSONL export from the shared db"
    pre_condition: 'file_exists("{{deparosDBDir}}/vgnm_{{TargetSpace}}.sqlite")'
    commands:
      - "vigolium export --silent --db {{deparosDBDir}}/vgnm_{{TargetSpace}}.sqlite --only http --omit-response --format html -o {{deparosHTMLReport}}"
      - "vigolium export --silent --db {{deparosDBDir}}/vgnm_{{TargetSpace}}.sqlite --only http --omit-response --format jsonl -o {{contentDiscoveryRawJsonlFile}}"
      # just to save space, remove the vigolium db after report generation
      # - "rm -rf {{deparosDBDir}}/vgnm_{{TargetSpace}}.sqlite"

  - name: "normalize-deparos-records"
    type: bash
    log: "Normalizing vigolium content-discovery records into the flat schema"
    pre_condition: 'file_exists("{{contentDiscoveryRawJsonlFile}}")'
    commands:
      # flatten the nested vigolium http_record objects into the flat fields the markdown/db steps expect
      - "jq -c 'select(.type==\"http_record\") | .data | {url, status_code, title: .response_title, words: .response_words, content_length: .response_content_length, content_type: .response_content_type}' {{contentDiscoveryRawJsonlFile}} > {{contentDiscoveryJsonlFile}}"

  - name: deparos-beautify-interesting-content-results
    type: function
    log: "Beautifying interesting content results"
    pre_condition: 'file_exists("{{contentDiscoveryJsonlFile}}")'
    functions:
      - jsonl_filter("{{contentDiscoveryJsonlFile}}", "{{contentDiscoveryCleanJsonlFile}}", "url,status_code,title,words,content_length,content_type")
      - sort_unix("{{contentDiscoveryCleanJsonlFile}}")
      - 'convert_jsonl_to_markdown("{{contentDiscoveryCleanJsonlFile}}", "{{contentDiscoverMarkdownFile}}")'

  # Load data into DB and send report via Telegram
  - name: process-dirb-data-in-db
    type: function
    log: "Processing dirb-data in db"
    pre_condition: 'file_exists("{{contentDiscoveryJsonlFile}}")'
    functions:
      - 'db_total_content("{{contentDiscoveryJsonlFile}}")'
      - 'db_import_custom_asset("{{TargetSpace}}", "{{contentDiscoveryJsonlFile}}", "content-discovery", "deparos")'
      - 'send_telegram_file("{{deparosHTMLReport}}", "HTML Content Discovery Results")'
    on_error:
      - action: continue # in case of error, continue the workflow

  ### Fallback ffuf method if the deparos method having error ###
  - name: directory-bruteforce-with-ffuf
    type: foreach
    log: "Running directory bruteforce with ffuf"
    pre_condition: 'file_exists("{{httpFile}}")'
    input: "{{httpFile}}"
    variable: line
    threads: "{{ffufParallel}}"
    step:
      name: ffuf-single-target
      type: bash
      command: 'timeout -k 1m {{ffufTimeout}} ffuf -s -t {{ffThreads}} -noninteractive -ac -acs advanced -timeout 15 -se -D -fc "429,404,400" -e "asp,aspx,aspx~,asp~,py,py~,rb,rb~,php,php~,bak,bkp,cache,cgi,conf,csv,html,inc,js,json,jsp,jsp~,log,old,txt" -json -H "{{defaultUA}}" -ac -s -fc "429,404,400" -json -u "[[line]]/FUZZ" -w {{contentDiscoverWordlist}}:FUZZ > {{Output}}/content-discovery/ffuf-raw-[[_id_]].json 2>/dev/null'

  # ---------------------------------------------------------------------------
  # Process and beautify results
  # ---------------------------------------------------------------------------
  - name: process-ffuf-results
    type: function
    log: "Processing and beautifying scan results"
    pre_condition: 'dir_length("{{Output}}/content-discovery/") > 0'
    functions:
      - exec_cmd("cat {{Output}}/content-discovery/ffuf-raw-*.json | jq -r '.url' > {{contentDiscoverUrlsFile}}")
      # clean up raw json files
      - exec_cmd("rm -rf {{Output}}/content-discovery/ffuf-raw-*.json")
      - sort_unix("{{contentDiscoverUrlsFile}}")

  # ---------------------------------------------------------------------------
  # HTTP fingerprinting with pd-httpx
  # ---------------------------------------------------------------------------
  - name: http-fingerprint-on-discovered-urls
    type: bash
    log: "Fingerprinting discovered URLs with pd-httpx"
    pre_condition: 'file_exists("{{contentDiscoverUrlsFile}}")'
    commands:
      - 'cat {{contentDiscoverUrlsFile}} | pd-httpx -H "{{defaultUA}}" -timeout {{httpTimeout}} -t {{httpThreads}} -no-fallback -no-color -silent -json -title -favicon -hash sha256 -jarm -tech-detect -status-code -cdn -tls-grab -ztls -vhost -follow-host-redirects -include-chain >> {{httpFingerprintJsonFile}}'
  - name: process-content-discovery-fingerprint-in-db
    type: function
    log: "Processing content discovery fingerprint in db"
    pre_condition: 'file_exists("{{httpFingerprintJsonFile}}")'
    functions:
      - jsonl_filter("{{httpFingerprintJsonFile}}", "{{httpInterestingFilteredJsonFile}}", "url,title,status_code,content_length,lines,webserver,tech,cdn")
      - 'db_total_urls("{{httpInterestingFilteredJsonFile}}")'
      - 'db_total_assets("{{httpInterestingFilteredJsonFile}}")'
      - 'db_import_asset_from_file("{{TargetSpace}}", "{{httpInterestingFilteredJsonFile}}")'
    on_error:
      - action: continue # in case of error, continue the workflow
