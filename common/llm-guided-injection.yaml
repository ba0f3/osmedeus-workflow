# =============================================================================
# Module Workflow: LLM-Guided Injection Scanning
# =============================================================================

kind: module
name: llm-guided-injection
description: Test LLM-suggested parameterized URLs with sqlmap and dalfox
tags: llm, vulnerability, security, injection, sqli, xss

# -----------------------------------------------------------------------------
# PARAMS SECTION
# -----------------------------------------------------------------------------
params:
  - name: llmParameterCandidatesFile
    default: "{{Output}}/llm/parameter-candidates-{{TargetSpace}}.txt"
  - name: llmInjectionDir
    default: "{{Output}}/vulnscan/llm-injection"
  - name: llmInjectableFile
    default: "{{Output}}/vulnscan/llm-injection/llm-injectable-urls-{{TargetSpace}}.txt"
  - name: llmDalfoxInputFile
    default: "{{Output}}/vulnscan/llm-injection/llm-injectable-urls-dalfox-{{TargetSpace}}.txt"
  - name: llmSqlmapFindingsJsonl
    default: "{{Output}}/vulnscan/llm-injection/sqlmap-findings-{{TargetSpace}}.jsonl"
  - name: llmDalfoxFindingsJsonl
    default: "{{Output}}/vulnscan/llm-injection/dalfox-findings-{{TargetSpace}}.jsonl"
  - name: llmDalfoxRawJsonl
    default: "{{Output}}/vulnscan/llm-injection/dalfox-raw-{{TargetSpace}}.jsonl"
  - name: llmInjectionFindingsJsonl
    default: "{{Output}}/vulnscan/llm-injection/injection-findings-{{TargetSpace}}.jsonl"
  - name: llmInjectionCleanJsonl
    default: "{{Output}}/vulnscan/llm-injection/injection-findings-clean-{{TargetSpace}}.jsonl"
  - name: llmInjectionMarkdownReport
    default: "{{Output}}/vulnscan/llm-injection/injection-findings-{{TargetSpace}}.md"

  - name: llmInjectionLimit
    default: "200"
  - name: sqlmapRisk
    default: "1"
  - name: sqlmapLevel
    default: "2"
  - name: injectionThreads
    default: "{{ threads }}"
  - name: sqlmapTimeout
    default: "90m"
  - name: enableDalfox
    type: bool
    default: true

# -----------------------------------------------------------------------------
# DEPENDENCIES SECTION
# -----------------------------------------------------------------------------
dependencies:
  commands:
    - sqlmap
    - dalfox
    - python3

  variables:
    - name: Target
      type: string
      required: true

# -----------------------------------------------------------------------------
# REPORTS SECTION
# -----------------------------------------------------------------------------
reports:
  - name: llm-sqli-results
    path: "{{llmInjectionDir}}/sqlmap-summary.txt"
    type: txt
    description: sqlmap summary for LLM-guided candidates

  - name: llm-xss-results
    path: "{{llmInjectionDir}}/dalfox-results.txt"
    type: txt
    description: Dalfox results for LLM-guided candidates

  - name: llm-injection-findings-jsonl
    path: "{{llmInjectionFindingsJsonl}}"
    type: jsonl
    description: LLM-guided injection findings in nuclei-compatible JSONL

  - name: llm-injection-markdown-report
    path: "{{llmInjectionMarkdownReport}}"
    type: md
    description: Markdown report of LLM-guided injection findings

# -----------------------------------------------------------------------------
# STEPS SECTION
# -----------------------------------------------------------------------------
steps:
  - name: create-output-folders
    type: function
    log: "Creating LLM-guided injection output folder"
    functions:
      - 'create_folder("{{Output}}/vulnscan")'
      - 'create_folder("{{llmInjectionDir}}")'

  - name: build-llm-injectable-url-list
    type: bash
    log: "Building LLM-guided injectable URL list"
    pre_condition: 'file_length("{{llmParameterCandidatesFile}}") > 0'
    commands:
      - |
        grep '?' "{{llmParameterCandidatesFile}}" | grep -Fi '{{TargetSpace}}' | sort -u | head -n {{llmInjectionLimit}} > "{{llmInjectableFile}}"
    on_error:
      - action: continue

  - name: sqlmap-llm-injection-scan
    type: bash
    log: "Running sqlmap on LLM-suggested parameterized URLs"
    pre_condition: 'file_length("{{llmInjectableFile}}") > 0'
    commands:
      - |
        timeout -k 1m {{sqlmapTimeout}} sqlmap -m {{llmInjectableFile}} \
          --batch --random-agent \
          --level={{sqlmapLevel}} --risk={{sqlmapRisk}} \
          --threads={{injectionThreads}} \
          --output-dir={{llmInjectionDir}}/sqlmap \
          --flush-session \
          2>&1 | tee {{llmInjectionDir}}/sqlmap-run.log || true
      - find {{llmInjectionDir}}/sqlmap -name 'log' -exec cat {} \; > {{llmInjectionDir}}/sqlmap-summary.txt 2>/dev/null || true
    on_error:
      - action: continue

  - name: normalize-llm-sqlmap-findings
    type: bash
    log: "Normalizing LLM-guided sqlmap findings"
    pre_condition: 'file_exists("{{llmInjectionDir}}/sqlmap")'
    commands:
      - |
        python3 - "{{llmInjectionDir}}/sqlmap" "{{llmSqlmapFindingsJsonl}}" <<'PY'
        import csv
        import json
        import sys
        from pathlib import Path
        from urllib.parse import urlparse

        sqlmap_dir = Path(sys.argv[1])
        out_path = Path(sys.argv[2])
        findings = []
        seen = set()

        def add_finding(url, place="", parameter="", techniques="", note=""):
            url = (url or "").strip()
            if not url or url in seen:
                return
            seen.add(url)
            host = urlparse(url).hostname or ""
            desc = "SQL injection confirmed by sqlmap from LLM-guided candidate"
            extracted = []
            for label, value in (("parameter", parameter), ("place", place), ("techniques", techniques)):
                value = (value or "").strip()
                if value:
                    extracted.append(f"{label}={value}")
            findings.append({
                "template-id": "llm-guided-sqlmap-sqli",
                "info": {
                    "name": "SQL Injection (LLM-guided)",
                    "severity": "critical",
                    "tags": ["sqli", "sqlmap", "injection", "llm-guided"],
                    "description": desc,
                },
                "type": "http",
                "host": host,
                "url": url,
                "matched-at": url,
                "extracted-results": extracted,
            })

        for csv_path in sorted(sqlmap_dir.glob("results-*.csv")):
            with csv_path.open(newline="", encoding="utf-8", errors="replace") as handle:
                reader = csv.DictReader(handle)
                for row in reader:
                    add_finding(
                        row.get("Target URL") or row.get("TargetURL") or "",
                        row.get("Place") or "",
                        row.get("Parameter") or "",
                        row.get("Technique(s)") or row.get("Techniques") or "",
                        row.get("Note(s)") or row.get("Notes") or "",
                    )

        out_path.write_text(
            "".join(json.dumps(item, ensure_ascii=False) + "\n" for item in findings),
            encoding="utf-8",
        )
        print(f"normalized {len(findings)} LLM-guided sqlmap finding(s) -> {out_path}")
        PY
    on_error:
      - action: continue

  - name: filter-llm-sqlmap-urls-for-dalfox
    type: bash
    log: "Removing confirmed SQLi URLs from LLM-guided Dalfox input"
    pre_condition: '{{enableDalfox}} && file_length("{{llmInjectableFile}}") > 0'
    commands:
      - |
        python3 - "{{llmInjectableFile}}" "{{llmSqlmapFindingsJsonl}}" "{{llmDalfoxInputFile}}" <<'PY'
        import json
        import sys
        from pathlib import Path
        from urllib.parse import urlsplit, urlunsplit

        injectable_path = Path(sys.argv[1])
        sqlmap_findings_path = Path(sys.argv[2])
        out_path = Path(sys.argv[3])

        def normalize_url(url: str) -> str:
            parts = urlsplit((url or "").strip())
            path = parts.path.rstrip("/") or "/"
            return urlunsplit((parts.scheme.lower(), parts.netloc.lower(), path, parts.query, ""))

        skip_urls = set()
        if sqlmap_findings_path.is_file() and sqlmap_findings_path.stat().st_size > 0:
            for line in sqlmap_findings_path.read_text(encoding="utf-8", errors="replace").splitlines():
                try:
                    row = json.loads(line)
                except json.JSONDecodeError:
                    continue
                normalized = normalize_url(row.get("url") or row.get("matched-at") or "")
                if normalized:
                    skip_urls.add(normalized)

        kept = []
        for line in injectable_path.read_text(encoding="utf-8", errors="replace").splitlines():
            url = line.strip()
            if url and normalize_url(url) not in skip_urls:
                kept.append(url)

        out_path.write_text("\n".join(kept) + ("\n" if kept else ""), encoding="utf-8")
        PY
    on_error:
      - action: continue

  - name: dalfox-llm-xss-scan
    type: bash
    log: "Running Dalfox on LLM-suggested parameterized URLs"
    pre_condition: '{{enableDalfox}} && file_length("{{llmDalfoxInputFile}}") > 0'
    commands:
      - |
        echo "[dalfox] $(date -u '+%Y-%m-%dT%H:%M:%SZ') starting LLM-guided XSS scan with $(wc -l < "{{llmDalfoxInputFile}}") URL(s)"
        dalfox file "{{llmDalfoxInputFile}}" \
          --skip-bav --format jsonl \
          --output "{{llmDalfoxRawJsonl}}" \
          2>&1 | tee "{{llmInjectionDir}}/dalfox-results.txt" || true
        echo "[dalfox] $(date -u '+%Y-%m-%dT%H:%M:%SZ') finished LLM-guided XSS scan; raw output: {{llmDalfoxRawJsonl}}"
    on_error:
      - action: continue

  - name: normalize-llm-dalfox-findings
    type: bash
    log: "Normalizing LLM-guided Dalfox findings"
    pre_condition: 'file_length("{{llmDalfoxRawJsonl}}") > 0'
    commands:
      - |
        python3 - "{{llmDalfoxRawJsonl}}" "{{llmDalfoxFindingsJsonl}}" <<'PY'
        import json
        import sys
        from pathlib import Path
        from urllib.parse import urlparse

        raw_path = Path(sys.argv[1])
        out_path = Path(sys.argv[2])
        findings = []

        for line in raw_path.read_text(encoding="utf-8", errors="replace").splitlines():
            try:
                row = json.loads(line)
            except json.JSONDecodeError:
                continue
            url = row.get("data") or row.get("url") or row.get("poc") or ""
            if not url:
                continue
            findings.append({
                "template-id": "llm-guided-dalfox-xss",
                "info": {
                    "name": "Cross-Site Scripting (LLM-guided)",
                    "severity": "high",
                    "tags": ["xss", "dalfox", "injection", "llm-guided"],
                    "description": "XSS candidate reported by Dalfox from an LLM-guided parameterized URL",
                },
                "type": "http",
                "host": urlparse(url).hostname or "",
                "url": url,
                "matched-at": url,
                "extracted-results": [json.dumps(row, ensure_ascii=False)[:1000]],
            })

        out_path.write_text(
            "".join(json.dumps(item, ensure_ascii=False) + "\n" for item in findings),
            encoding="utf-8",
        )
        PY
    on_error:
      - action: continue

  - name: merge-llm-injection-findings
    type: bash
    log: "Merging LLM-guided injection findings"
    commands:
      - |
        {
          [ -f "{{llmSqlmapFindingsJsonl}}" ] && cat "{{llmSqlmapFindingsJsonl}}"
          [ -f "{{llmDalfoxFindingsJsonl}}" ] && cat "{{llmDalfoxFindingsJsonl}}"
        } | sort -u > "{{llmInjectionFindingsJsonl}}"
    on_error:
      - action: continue

  - name: generate-llm-injection-report
    type: function
    log: "Generating LLM-guided injection report"
    pre_condition: 'file_length("{{llmInjectionFindingsJsonl}}") > 0'
    functions:
      - jsonl_filter("{{llmInjectionFindingsJsonl}}", "{{llmInjectionCleanJsonl}}", "template-id,info.name,info.severity,matched-at,extracted-results")
      - 'convert_jsonl_to_markdown("{{llmInjectionCleanJsonl}}", "{{llmInjectionMarkdownReport}}")'
      - 'db_import_vuln_from_file("{{TargetSpace}}", "{{llmInjectionFindingsJsonl}}")'
      - 'send_telegram_file("{{llmInjectionMarkdownReport}}", "LLM-Guided Injection Results")'
    on_error:
      - action: continue
