  #   type: bash
  #   log: "Fetching HTTP responses and scanning for secrets with trufflehog"
  #   commands:
  #     - "cat {{linkFile}} | pd-httpx -silent -nf -no-color -title -t {{httpThreads}} -H '{{defaultUA}}' --store-response-dir {{httpResponse}}"
